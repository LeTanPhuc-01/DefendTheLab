<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controller</title>

    <link rel="stylesheet" href="/node_modules/webtouch-sdk/public-css/webtouchController.css">

    <style>
        /* Essential styles for the full-screen touchpad */
        body {
            background-color: #111;
            /* Dark background */
            touch-action: none;
            /* Crucial: Prevents mobile browser scrolling/swiping */
            overflow: hidden;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #controller-app {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #drawingCanvas {
            background: white;
            touch-action: none;
            border: 2px solid #4ade80;
            border-radius: 8px;
            /* Center it */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .instructions {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #4ade80;
            font-family: sans-serif;
            pointer-events: none;
        }
    </style>

    <script src="/socket.io/socket.io.js"></script>

    <script type="importmap">
    {
        "imports": {
            "webtouch-sdk": "/node_modules/webtouch-sdk/client.js"
        }
    }
    </script>
</head>

<body>

    <div id="controller-app"></div>

    <script type="module" src="/js/controllerMain.js"></script>
</body>

</html>
